      document.getElementById("viento").textContent = data[city].viento;

      data[city].pronostico.forEach(dia => {
        const card = document.createElement("div");
        card.className = "col-md-3 col-sm-6 mb-3";
        card.innerHTML = `
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">${dia.dia}</h5>
              <p class="card-text">${dia.estado}</p>
              <span class="badge bg-primary">${dia.temp}</span>
            </div>

        pronosticoDiv.appendChild(card);
      });
    } else {
      document.getElementById("ciudad").textContent = "Ciudad no encontrada";
    }
